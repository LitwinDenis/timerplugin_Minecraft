name: timerplugin
version: '1.0-SNAPSHOT'
main: org.denis.timerplugin.Timerplugin
api-version: '1.21'
commands:
  starttimer:
    description: Start the timer
    usage: /starttimer
  stoptimer:
    description: stops timer
    usage: /stoptimer
  resettimer:
    description: reset timer
    usage: /resettimer

permissions:
  timer.use:
    description: only op rights
    default: op